services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: datatalk
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d datatalk"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/datatalk
      QUERY_DATABASE_URL: postgresql+psycopg://datatalk_reader:datatalk_reader@db:5432/datatalk
      SECRET_KEY: change_this_secret_key_use_at_least_32_chars
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      LLM_REQUEST_TIMEOUT_SECONDS: ${LLM_REQUEST_TIMEOUT_SECONDS:-30}
      LLM_MAX_RETRIES: ${LLM_MAX_RETRIES:-2}
      LLM_RETRY_BACKOFF_SECONDS: ${LLM_RETRY_BACKOFF_SECONDS:-0.25}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_CHAT_MODEL: ${GEMINI_CHAT_MODEL:-gemini-2.5-flash}
      QUERY_MAX_ROWS: 100
      DEFAULT_QUERY_LIMIT: 20
      QUERY_STATEMENT_TIMEOUT_MS: 5000
      QUERY_LOCK_TIMEOUT_MS: 1000
      ENVIRONMENT: development
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 3s

volumes:
  postgres_data:
